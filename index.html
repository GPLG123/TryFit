<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>TryFit - Smart Virtual Fitting</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>

body{
margin:0;
font-family:Arial;
background:#f6f6f6;
}

header{
background:black;
color:white;
padding:20px;
font-size:28px;
text-align:center;
}

nav{
background:#222;
color:white;
padding:10px;
text-align:center;
}

nav span{
margin:0 15px;
cursor:pointer;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
}

canvas{
border:1px solid #ddd;
}

.products{
display:flex;
flex-wrap:wrap;
justify-content:center;
}

.product{
background:white;
padding:15px;
margin:10px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
width:200px;
}

.product img{
width:100%;
border-radius:8px;
}

#result{
margin-top:10px;
font-weight:bold;
}

</style>

</head>

<body>

<header>
TryFit
</header>

<nav>
<span>Home</span>
<span>Products</span>
<span>Virtual Try On</span>
</nav>

<div class="container">

<div class="card">

<h3>Your Body Measurements</h3>

Height<br>
<input id="height"><br>

Weight<br>
<input id="weight"><br>

Chest<br>
<input id="chest"><br>

Waist<br>
<input id="waist"><br>

Hips<br>
<input id="hips"><br>

<button onclick="predictSize()">Find Size</button>

<div id="result"></div>

</div>

<div class="card">

<h3>TryFit Avatar</h3>

<canvas id="avatar" width="350" height="350"></canvas>

</div>

</div>

<h2 style="text-align:center">Products</h2>

<div class="products">

<div class="product">

<img src="https://images.unsplash.com/photo-1520975928318-8b3d7c5b3a7e">

<p>Classic T-Shirt</p>

<button onclick="applyClothes(0x3366ff)">Try On</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">

<p>Summer Dress</p>

<button onclick="applyClothes(0xff6699)">Try On</button>

</div>

<div class="product">

<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">

<p>Casual Hoodie</p>

<button onclick="applyClothes(0x444444)">Try On</button>

</div>

</div>

<script>

let scene=new THREE.Scene()

let camera=new THREE.PerspectiveCamera(
75,
350/350,
0.1,
1000
)

let renderer=new THREE.WebGLRenderer({
canvas:document.getElementById("avatar")
})

renderer.setSize(350,350)

let geometry=new THREE.BoxGeometry(1,2,0.6)

let material=new THREE.MeshBasicMaterial({
color:0xdddddd
})

let body=new THREE.Mesh(geometry,material)

scene.add(body)

camera.position.z=5

function animate(){

requestAnimationFrame(animate)

renderer.render(scene,camera)

}

animate()

function predictSize(){

let chest=document.getElementById("chest").value
let waist=document.getElementById("waist").value
let hips=document.getElementById("hips").value

let size="M"

if(chest<90 && waist<75){

size="S"

}

else if(chest>105 || hips>105){

size="L"

}

document.getElementById("result").innerHTML =
"Recommended Size: "+size

body.scale.x = 1 + chest/200
body.scale.y = 1 + waist/300

}

function applyClothes(color){

body.material.color.set(color)

}

</script>

</body>

</html>
