```html
<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<title>TryFit - Virtual Fitting</title>

<script src="https://cdn.jsdelivr.net/npm/three@0.158.0/build/three.min.js"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f5f5f5;
text-align:center;
}

header{
background:black;
color:white;
padding:20px;
font-size:28px;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

input, select{
padding:8px;
margin:5px;
width:200px;
}

button{
padding:10px 20px;
background:black;
color:white;
border:none;
cursor:pointer;
margin-top:10px;
}

.products{
display:flex;
justify-content:center;
flex-wrap:wrap;
}

.product{
background:white;
margin:10px;
padding:15px;
border-radius:10px;
box-shadow:0 0 8px rgba(0,0,0,0.1);
width:200px;
}

.product img{
width:100%;
border-radius:8px;
}

canvas{
border:1px solid #ddd;
}

</style>

</head>

<body>

<header>TryFit Virtual Fitting</header>

<div class="container">

<div class="card">

<h3>Your Body</h3>

Height<br>
<input id="height"><br>

Chest<br>
<input id="chest"><br>

Waist<br>
<input id="waist"><br>

Hips<br>
<input id="hips"><br>

Size<br>
<select id="size">
<option>S</option>
<option>M</option>
<option>L</option>
</select>

<br>

<button onclick="updateAvatar()">Update Avatar</button>

</div>

<div class="card">

<h3>Avatar</h3>

<canvas id="avatar" width="350" height="350"></canvas>

</div>

</div>

<h2>Products</h2>

<div class="products">

<div class="product">
<img src="https://images.unsplash.com/photo-1520975928318-8b3d7c5b3a7e">
<p>T-Shirt</p>
<button onclick="wearClothes(0x3366ff)">Try On</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1512436991641-6745cdb1723f">
<p>Dress</p>
<button onclick="wearClothes(0xff6699)">Try On</button>
</div>

<div class="product">
<img src="https://images.unsplash.com/photo-1490481651871-ab68de25d43d">
<p>Hoodie</p>
<button onclick="wearClothes(0x444444)">Try On</button>
</div>

</div
